<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <div mat-card-avatar class="example-header-image"></div>
    <mat-card-title>{{ card.title }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <ng-container *ngFor="let item of card.items">
      <app-sensor
        *ngIf="item.type === 'sensor'; else deviceItem"
        [item]="item"
      ></app-sensor>
      <ng-template #deviceItem>
        <app-device [item]="item"></app-device>
      </ng-template>
    </ng-container>
  </mat-card-content>
  <mat-card-actions> </mat-card-actions>
</mat-card>
