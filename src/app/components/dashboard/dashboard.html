<div *ngIf="dashBoardData; else loading">
  <div class="bg-teal-900 w-full flex flex-wrap gap-4 h-full">
    <mat-tab-group class="tabs">
      <mat-tab
        class="tab"
        *ngFor="let tab of dashBoardData.tabs"
        label="{{ tab.title }}"
      >
        <ng-template mat-tab-label>
          <span
            [routerLink]="['/dashboard', dashboardId, tab.id]"
            [state]="tab"
            (click)="logRouterLink(tab)"
          >{{tab.title}}</span>
          <router-outlet></router-outlet>
        </ng-template>
      </mat-tab>
    </mat-tab-group>
  </div>
</div>
<ng-template #loading>
  <p>Loading data, please wait...</p>
</ng-template>
