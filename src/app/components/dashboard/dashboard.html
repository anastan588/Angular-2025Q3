<div *ngIf="dashBoardData !== null; else loading">
  <div class="bg-teal-900 w-full flex flex-col gap-4 p-2">
    <p class="dashboard-title">{{ dashboard }}</p>
    <div class="dashboard-buttons">
      <button
        *ngIf="!isEditing"
        class="edit-dashboard-button"
        mat-icon-button
        (click)="editDasboard()"
      >
        Edit</button
      ><ng-container *ngIf="isEditing">
        <button
          class="edit-dashboard-button"
          mat-icon-button
          (click)="saveDashboard()"
        >
          Save
        </button>
        <button
          class="edit-dashboard-button"
          mat-icon-button
          (click)="discardChanges()"
        >
          Discard
        </button>
      </ng-container>
    </div>
    <button
      class="add-tab-button"
      mat-icon-button
      (click)="addTab()"
      *ngIf="isEditing"
    >
      <mat-icon class="add-tab-button-icon">add</mat-icon>
    </button>
    <mat-tab-group class="tabs">
      <mat-tab
        class="tab"
        *ngFor="
          let tab of isEditing
            ? (dashBoardDataEditing$ | async)!.tabs
            : dashBoardData.tabs;
          trackBy: trackByTabId
        "
        [label]="tab.title"
      >
        <ng-template mat-tab-label>
          <p
            class="tab-title"
            (click)="routerTab(tab)"
            tabindex="0"
            (keydown.enter)="routerTab(tab)"
          >
            {{ tab.title }}
          </p>
          <button
            class="edit-tab-button"
            mat-icon-button
            (click)="editTab()"
          >
            Edit
          </button>
          <button
            *ngIf="isEditing"
            [attr.data-id]="tab.id"
            class="delete-tab-button"
            mat-icon-button
            (click)="deleteTab(tab.id)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </ng-template>
        <router-outlet></router-outlet>
      </mat-tab>
    </mat-tab-group>
  </div>
</div>
<ng-template #loading>
  <p>Loading data, please wait...</p>
</ng-template>
