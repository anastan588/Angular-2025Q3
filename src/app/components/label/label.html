<div *ngIf="isLoading; else dataTemplate">
  <p>Loading data, please wait 2...</p>
</div>
<ng-template #dataTemplate>
  <div *ngIf="tab; else noDataTemplate">
    <div class="tab-content">
      <app-card-item *ngFor="let card of isEditing
            ? (cardsEditing$ | async)!
            : tab.cards;
          let i = index;
          trackBy: trackByCardId" [card]="card" [tab]="tab" />
    </div>
  </div>
</ng-template>
<ng-template #noDataTemplate>
  <p>No state data available.</p>
</ng-template>
